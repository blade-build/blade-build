name: "Blade CodeQL configuration"

# These rules trigger on patterns that are either intentional architecture
# choices or pre-existing conventions. Each exclusion has a rationale below.

query-filters:
- exclude:
    id:
      # Cyclic imports are inherent in blade's design — target modules import
      # from each other (e.g. proto_library imports cc_targets and java_targets).
      - py/cyclic-import

      # Subclasses legitimately change the type attribute (e.g. JavaTest
      # sets self.type = 'java_test', CcTest overwrites PythonBinary.type).
      # These are not bugs; they are how blade models target polymorphism.
      - py/overwritten-inherited-attribute

      # Unit tests follow a convention of `import unittest` and
      # `from unittest import mock`. Both are needed and this is harmless.
      - py/import-and-import-from

      # target_tags.py defines `match_tags` for eval'd filter code.
      - py/unused-local-variable

      # _log file is deliberately kept open for the process lifetime.
      - py/file-not-closed
