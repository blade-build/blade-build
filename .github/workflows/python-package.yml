# This workflow will install Python dependencies, run tests and type-check with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ master, v3 ]
  pull_request:
    branches: [ master, v3 ]

jobs:
  integration-tests:
    name: Integration tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # gcovr drives the C/C++ coverage report exercised by cc_coverage_test.
        python -m pip install coverage coveralls ninja gcovr
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Run integration tests
      run: |
        src/test/runall.sh
    - name: Add unit-test coverage and upload to Coveralls
      # Only from a single matrix entry, so the branch gets one Coveralls build
      # rather than five competing ones. (The upload step was dropped in the v3
      # CI rewrite, which is why the badge went grey.)
      #
      # `src/test/run.sh` already left a combined $PWD/.coverage from the
      # integration tests. Run the unit tests under coverage too and merge them
      # in with `combine --append`, so Coveralls reflects both suites.
      #
      # Non-fatal: coverage upload is informational and integration-tests gates
      # e2e-smoke, so a Coveralls hiccup must not turn the whole build red.
      if: matrix.python-version == '3.12'
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        pip install pytest
        PYTHONPATH=src python -m coverage run --rcfile=.coveragerc \
            --source="$PWD/src/blade" -m pytest src/tests/unit
        python -m coverage combine --append --rcfile=.coveragerc
        python -m coverage report --rcfile=.coveragerc
        coveralls --service=github

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    - name: Install protoc
      # So the real-protoc proto->java srcjar e2e (proto_java_srcjar_test.py)
      # runs instead of being skipped; it needs only protoc (no protobuf-java).
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
    - name: Run unit tests
      run: |
        PYTHONPATH=src python -m pytest src/tests/unit -v

  pyright:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install pyright
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    - name: Run pyright
      run: |
        pyright

  e2e-smoke:
    # Cross-repo smoke: drive the real build/test loop against the
    # blade-build/blade-test fixtures. Blocking — first run was fully
    # green in under a minute, so this gate protects the v3 → blade-test
    # contract. If host-toolchain flakes emerge, reintroduce
    # `continue-on-error: true` as a temporary circuit breaker rather
    # than leaving it on by default.
    name: E2E smoke (blade-test)
    needs: [integration-tests, unit-tests, pyright]
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout blade-build
      uses: actions/checkout@v6
      with:
        path: blade-build
    - name: Checkout blade-test (sibling)
      uses: actions/checkout@v6
      with:
        repository: blade-build/blade-test
        path: blade-test
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install ninja
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build
    - name: Install e2e toolchain (flex/bison/protoc)
      # Pre-install toolchains required by the upcoming blade-test suites
      # migrated from blade-build/example/: lex_yacc needs flex + bison,
      # proto_basic needs protoc + libprotobuf-dev, py_proto additionally
      # needs python3-protobuf at runtime. These packages are idempotent
      # no-ops for suites that do not consume them, so installing them
      # ahead of the suite PRs keeps later commits focused.
      run: |
        sudo apt-get install -y flex bison protobuf-compiler libprotobuf-dev python3-protobuf
    - name: Run blade-test suites
      working-directory: blade-test
      run: |
        # CUDA toolkit not available on CI — skip cu_basic suites.
        # vcpkg_basic is exercised by blade-test's own dedicated vcpkg jobs;
        # exclude it here so this smoke does not install vcpkg ports on every
        # blade PR (blade is demand-driven, so the excluded target = no install).
        ./blade.sh test //suites/... \
          --exclude-targets '//suites/cu_basic/...,//suites/vcpkg_basic/...'
