name: Windows CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    name: Unit tests (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    - name: Run Windows-compatible unit tests
      run: |
        $env:PYTHONPATH = "src"
        python -m pytest src/tests/unit/toolchain_test.py src/tests/unit/util_test.py src/tests/unit/blade_types_test.py -v

  smoke-test:
    name: Windows smoke test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install ninja
      run: |
        python -m pip install ninja
    - name: Verify imports and toolchain
      run: |
        $env:PYTHONPATH = "src"
        python -c "
        import blade.toolchain, blade.config, blade.util, blade.console
        import blade.inclusion_check, blade.target, blade.workspace
        print('All core imports OK')

        tc = blade.toolchain.create_toolchain()
        assert tc.cc_is('msvc'), f'Expected MSVC toolchain, got: {type(tc).__name__}'
        assert tc.object_file_of('test.c') == 'test.c.obj'
        assert tc.static_library_name('foo') == 'foo.lib'
        assert tc.dynamic_library_name('foo') == 'foo.dll'
        assert tc.executable_file_name('foo') == 'foo.exe'
        print(f'MSVC toolchain: cc={tc.cc}')
        print(f'cc version: {tc.cc_version}')
        print(f'deps_style: {tc.deps_style}')
        print(f'uses_depfile: {tc.uses_depfile}')

        # Verify BuildArchitecture recognizes win32/win64
        import blade.toolchain
        arch = blade.toolchain.BuildArchitecture.get_canonical_architecture('x64')
        assert arch == 'win64', f'x64 should map to win64, got: {arch}'
        assert blade.toolchain.BuildArchitecture.get_architecture_bits('win64') == '64'
        print(f'BuildArchitecture: x64 -> {arch}')

        print('All smoke tests passed.')
        "

  e2e-smoke:
    name: E2E smoke (blade-test) — cc, java, lex_yacc, py
    runs-on: windows-latest
    steps:
    - name: Checkout blade-build
      uses: actions/checkout@v6
      with:
        path: blade-build
    - name: Checkout blade-test (sibling)
      uses: actions/checkout@v6
      with:
        repository: blade-build/blade-test
        path: blade-test
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Set up JDK 17 (for Java test suite)
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"
    - name: Install ninja
      run: |
        python -m pip install ninja
    - name: Install WinFlexBison (for lex_yacc test suite)
      shell: cmd
      run: |
        winget install -e --id WinFlexBison.win_flex_bison --accept-source-agreements --accept-package-agreements
        echo %LOCALAPPDATA%\Microsoft\WinGet\Links>> %GITHUB_PATH%
    - name: Verify tools
      shell: cmd
      run: |
        set "PATH=%LOCALAPPDATA%\Microsoft\WinGet\Links;%PATH%"
        where javac
        java -version
        where win_flex
        win_flex --version
        where win_bison
        win_bison --version
    - name: Run blade-test suites
      shell: cmd
      run: |
        rem Explicit targets — exclude cu_basic (CUDA toolkit not available on CI)
        set PYTHONPATH=%GITHUB_WORKSPACE%\blade-build\src
        cd /d %GITHUB_WORKSPACE%\blade-test
        call %GITHUB_WORKSPACE%\blade-build\blade.bat test //suites/cc_basic:hello_test //suites/cc_basic:hello_dynamic_test //suites/cc_basic:cross_package_dynamic_test //suites/cc_basic:hello-world //suites/java_basic:greeter_test //suites/lex_yacc_basic:calc_test //suites/py_basic:greeter_test //suites/resource_basic:greeter_test
